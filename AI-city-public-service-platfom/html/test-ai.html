<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI功能测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; }
        #testResults { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>AI功能测试页面</h1>
    
    <div class="test-section">
        <h2>API配置测试</h2>
        <button onclick="testAPIConfig()">测试API配置</button>
        <button onclick="testAccessToken()">测试AccessToken获取</button>
        <button onclick="testImageProcessing()">测试图片处理功能</button>
    </div>
    
    <div class="test-section">
        <h2>文件上传测试</h2>
        <input type="file" id="testImage" accept="image/*">
        <button onclick="testAIRecognition()">测试AI识别</button>
    </div>
    
    <div id="testResults"></div>

    <script src="js/ai-api.js"></script>
    <script>
        function addTestResult(message, type = 'info') {
            const resultsDiv = document.getElementById('testResults');
            const resultDiv = document.createElement('div');
            resultDiv.className = type;
            resultDiv.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            resultsDiv.appendChild(resultDiv);
        }

        // 测试API配置
        function testAPIConfig() {
            try {
                addTestResult('正在测试API配置...', 'info');
                
                if (typeof BAIDU_CLOUD_CONFIG !== 'undefined') {
                    addTestResult('API配置对象存在', 'success');
                    addTestResult(`API Key: ${BAIDU_CLOUD_CONFIG.API_KEY.substring(0, 10)}...`, 'info');
                    addTestResult(`Secret Key: ${BAIDU_CLOUD_CONFIG.SECRET_KEY.substring(0, 10)}...`, 'info');
                    
                    if (BAIDU_CLOUD_CONFIG.API_URLS) {
                        addTestResult('API URL配置存在', 'success');
                        Object.keys(BAIDU_CLOUD_CONFIG.API_URLS).forEach(key => {
                            addTestResult(`${key}: ${BAIDU_CLOUD_CONFIG.API_URLS[key]}`, 'info');
                        });
                    } else {
                        addTestResult('API URL配置缺失', 'error');
                    }
                } else {
                    addTestResult('API配置对象不存在', 'error');
                }
            } catch (error) {
                addTestResult(`配置测试错误: ${error.message}`, 'error');
                console.error('配置测试错误:', error);
            }
        }

        // 测试AccessToken获取
        async function testAccessToken() {
            try {
                addTestResult('正在测试AccessToken获取...', 'info');
                
                if (typeof getBaiduAccessToken === 'function') {
                    addTestResult('getBaiduAccessToken函数存在', 'success');
                    
                    const token = await getBaiduAccessToken();
                    if (token) {
                        addTestResult(`成功获取AccessToken: ${token.substring(0, 20)}...`, 'success');
                    } else {
                        addTestResult('获取AccessToken失败', 'error');
                    }
                } else {
                    addTestResult('getBaiduAccessToken函数不存在', 'error');
                }
            } catch (error) {
                addTestResult(`AccessToken测试错误: ${error.message}`, 'error');
                console.error('AccessToken测试错误:', error);
            }
        }

        // 测试图片处理功能
        async function testImageProcessing() {
            try {
                addTestResult('正在测试图片处理功能...', 'info');
                
                if (typeof ImageProcessor !== 'undefined') {
                    addTestResult('ImageProcessor模块存在', 'success');
                    
                    // 测试图片质量分析
                    const qualityResult = await ImageProcessor.analyzeImageQuality(null);
                    addTestResult(`图片质量分析: ${JSON.stringify(qualityResult)}`, 'info');
                    
                } else {
                    addTestResult('ImageProcessor模块不存在', 'error');
                }
                
                if (typeof AI_API !== 'undefined') {
                    addTestResult('AI_API模块存在', 'success');
                } else {
                    addTestResult('AI_API模块不存在', 'error');
                }
            } catch (error) {
                addTestResult(`图片处理测试错误: ${error.message}`, 'error');
                console.error('图片处理测试错误:', error);
            }
        }

        // 测试AI识别
        async function testAIRecognition() {
            try {
                const fileInput = document.getElementById('testImage');
                const file = fileInput.files[0];
                
                if (!file) {
                    addTestResult('请先选择图片文件', 'error');
                    return;
                }
                
                addTestResult('正在测试AI识别功能...', 'info');
                
                // 测试识别功能
                const result = await AI_API.recognizeFacility(file);
                addTestResult(`识别结果: ${JSON.stringify(result)}`, result.success ? 'success' : 'error');
                
            } catch (error) {
                addTestResult(`AI识别测试错误: ${error.message}`, 'error');
                console.error('AI识别测试错误:', error);
            }
        }

        // 页面加载完成后自动运行基础测试
        window.addEventListener('load', function() {
            addTestResult('页面加载完成，开始自动测试...', 'info');
            setTimeout(testAPIConfig, 1000);
        });
    </script>
</body>
</html>
