<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI功能测试 - 简化版</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section { 
            margin: 20px 0; 
            padding: 20px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            background: #f9f9f9;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { 
            margin: 5px; 
            padding: 10px 15px; 
            cursor: pointer; 
            background: #1a56db;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover { background: #0f3460; }
        #testResults { 
            margin-top: 20px; 
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            background: white;
        }
        .result-item {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #ccc;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1a56db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>AI功能测试 - 简化版</h1>
    
    <div class="test-section">
        <h2>基础功能测试</h2>
        <button onclick="testAPIConfig()">测试API配置</button>
        <button onclick="testSimpleRecognition()">测试简化识别</button>
        <button onclick="clearResults()">清空结果</button>
    </div>
    
    <div class="test-section">
        <h2>图片上传测试</h2>
        <input type="file" id="testImage" accept="image/*">
        <button onclick="testWithImage()">用图片测试识别</button>
    </div>
    
    <div id="testResults"></div>

    <!-- 简化的AI API代码 -->
    <script>
        // 简化的百度智能云配置
        const BAIDU_CLOUD_CONFIG = {
            API_KEY: 'Artfb21Kqo4aOwXpgRtsfhcm',
            SECRET_KEY: '2KsLUGF90AQ5pY35Lq4dX7oThpKXfvKm',
            API_URL: 'https://aip.baidubce.com/rest/2.0/image-classify/v2/advanced_general'
        };

        // 简化的获取AccessToken函数
        async function getBaiduAccessToken() {
            const url = `https://aip.baidubce.com/oauth/2.0/token?grant_type=client_credentials&client_id=${BAIDU_CLOUD_CONFIG.API_KEY}&client_secret=${BAIDU_CLOUD_CONFIG.SECRET_KEY}`;
            
            try {
                addTestResult('正在获取AccessToken...', 'info');
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                if (data.access_token) {
                    addTestResult('成功获取AccessToken', 'success');
                    return data.access_token;
                } else {
                    throw new Error(`获取AccessToken失败: ${data.error_description || '未知错误'}`);
                }
            } catch (error) {
                addTestResult(`获取AccessToken错误: ${error.message}`, 'error');
                throw error;
            }
        }

        // 简化的识别函数
        async function recognizeFacilitySimple(imageFile) {
            try {
                addTestResult('开始简化版识别流程...', 'info');
                
                // 获取AccessToken
                const accessToken = await getBaiduAccessToken();
                
                // 将图片转换为Base64
                addTestResult('正在转换图片为Base64...', 'info');
                const base64Image = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        const base64 = reader.result.split(',')[1];
                        resolve(base64);
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(imageFile);
                });
                
                addTestResult('图片转换完成', 'success');
                
                // 调用百度智能云图像识别API
                addTestResult('正在调用百度智能云API...', 'info');
                const response = await fetch(`${BAIDU_CLOUD_CONFIG.API_URL}?access_token=${accessToken}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `image=${encodeURIComponent(base64Image)}&baike_num=5`
                });
                
                const data = await response.json();
                addTestResult('API响应收到', 'success');
                
                // 处理API响应
                if (data.error_code) {
                    throw new Error(`API错误: ${data.error_msg} (错误码: ${data.error_code})`);
                }
                
                addTestResult('识别成功完成', 'success');
                return {
                    success: true,
                    data: data
                };
            } catch (error) {
                addTestResult(`识别失败: ${error.message}`, 'error');
                return {
                    success: false,
                    error: error.message
                };
            }
        }

        // 测试结果显示函数
        function addTestResult(message, type = 'info') {
            const resultsDiv = document.getElementById('testResults');
            const resultDiv = document.createElement('div');
            resultDiv.className = `result-item ${type}`;
            resultDiv.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            resultsDiv.appendChild(resultDiv);
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }

        // 清空结果
        function clearResults() {
            document.getElementById('testResults').innerHTML = '';
        }

        // 测试API配置
        async function testAPIConfig() {
            clearResults();
            addTestResult('开始测试API配置...', 'info');
            
            try {
                addTestResult(`API Key: ${BAIDU_CLOUD_CONFIG.API_KEY}`, 'info');
                addTestResult(`API URL: ${BAIDU_CLOUD_CONFIG.API_URL}`, 'info');
                
                // 测试获取AccessToken
                const token = await getBaiduAccessToken();
                if (token) {
                    addTestResult('API配置测试通过', 'success');
                } else {
                    addTestResult('API配置测试失败', 'error');
                }
            } catch (error) {
                addTestResult(`API配置测试错误: ${error.message}`, 'error');
                console.error('API配置测试错误:', error);
            }
        }

        // 测试简化识别
        async function testSimpleRecognition() {
            clearResults();
            addTestResult('开始测试简化识别功能...', 'info');
            
            // 创建一个模拟的图片文件
            const canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 200;
            const ctx = canvas.getContext('2d');
            
            // 绘制一个简单的图像
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, 200, 200);
            ctx.fillStyle = '#1a56db';
            ctx.fillRect(50, 50, 100, 100);
            ctx.fillStyle = '#333';
            ctx.font = '16px Arial';
            ctx.fillText('测试图片', 60, 110);
            
            canvas.toBlob(async function(blob) {
                const file = new File([blob], 'test.jpg', { type: 'image/jpeg' });
                
                addTestResult('创建测试图片完成', 'success');
                
                // 测试识别
                const result = await recognizeFacilitySimple(file);
                
                if (result.success) {
                    addTestResult('简化识别测试成功', 'success');
                    addTestResult(`识别结果: ${JSON.stringify(result.data, null, 2)}`, 'info');
                } else {
                    addTestResult(`简化识别测试失败: ${result.error}`, 'error');
                }
            }, 'image/jpeg', 0.8);
        }

        // 使用真实图片测试
        async function testWithImage() {
            const fileInput = document.getElementById('testImage');
            const file = fileInput.files[0];
            
            if (!file) {
                addTestResult('请先选择图片文件', 'error');
                return;
            }
            
            clearResults();
            addTestResult('使用真实图片进行测试...', 'info');
            addTestResult(`文件名: ${file.name}, 大小: ${(file.size/1024).toFixed(2)}KB`, 'info');
            
            const result = await recognizeFacilitySimple(file);
            
            if (result.success) {
                addTestResult('图片识别测试成功', 'success');
                if (result.data.result && result.data.result.length > 0) {
                    result.data.result.forEach((item, index) => {
                        addTestResult(`识别结果${index + 1}: ${item.keyword} (置信度: ${(item.score * 100).toFixed(1)}%)`, 'info');
                    });
                }
            } else {
                addTestResult(`图片识别测试失败: ${result.error}`, 'error');
            }
        }

        // 页面加载完成后自动运行基础测试
        window.addEventListener('load', function() {
            addTestResult('页面加载完成，AI测试工具准备就绪', 'success');
        });
    </script>
</body>
</html>
