<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户登录/注册 - 城市公共设施服务平台</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        padding: 20px;
      }

      .auth-card {
        background-color: var(--white);
        border-radius: var(--border-radius);
        box-shadow: var(--shadow-lg);
        padding: 40px;
        width: 100%;
        max-width: 450px;
        animation: fadeInUp 0.6s ease-out;
      }

      .auth-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .auth-header i {
        font-size: 48px;
        color: var(--primary-color);
        margin-bottom: 15px;
        animation: pulse 2s infinite;
      }

      .auth-header h2 {
        color: var(--primary-color);
        margin-bottom: 10px;
      }

      .auth-header p {
        color: var(--light-text);
      }

      .auth-tabs {
        display: flex;
        margin-bottom: 30px;
        border-bottom: 2px solid var(--border-color);
      }

      .auth-tab {
        flex: 1;
        padding: 15px;
        text-align: center;
        cursor: pointer;
        border: none;
        background: none;
        font-size: 16px;
        font-weight: 500;
        color: var(--light-text);
        transition: var(--transition);
        position: relative;
      }

      .auth-tab.active {
        color: var(--primary-color);
      }

      .auth-tab.active::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: var(--primary-color);
      }

      .auth-form {
        display: none;
      }

      .auth-form.active {
        display: block;
        animation: fadeIn 0.4s ease-out;
      }

      .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: var(--light-text);
        text-decoration: none;
        transition: var(--transition);
      }

      .back-link:hover {
        color: var(--primary-color);
        transform: translateX(-5px);
      }

      .success-message {
        background-color: rgba(40, 167, 69, 0.1);
        border: 1px solid var(--success-color);
        color: var(--success-color);
        padding: 15px;
        border-radius: var(--border-radius);
        margin-bottom: 20px;
        text-align: center;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeOut {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(-20px);
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <i class="fas fa-user-circle"></i>
          <h2>城市公共设施服务平台</h2>
          <p>欢迎使用，请登录或注册</p>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">
            <i class="fas fa-sign-in-alt"></i> 登录
          </button>
          <button class="auth-tab" data-tab="register">
            <i class="fas fa-user-plus"></i> 注册
          </button>
        </div>

        <div id="successMessage" class="success-message" style="display: none">
          <i class="fas fa-check-circle"></i>
          <span id="successText"></span>
        </div>

        <form id="loginForm" class="auth-form active">
          <div class="form-group">
            <label for="loginPhone">手机号</label>
            <input
              type="tel"
              id="loginPhone"
              name="phone"
              placeholder="请输入手机号"
              required
            />
          </div>
          <div class="form-group">
            <label for="loginPassword">密码</label>
            <div style="position: relative">
              <input
                type="password"
                id="loginPassword"
                name="password"
                placeholder="请输入密码"
                required
                style="width: 100%; padding-right: 40px"
              />
              <span
                onclick="togglePasswordVisibility('loginPassword')"
                style="
                  position: absolute;
                  right: 10px;
                  top: 50%;
                  transform: translateY(-50%);
                  cursor: pointer;
                  color: var(--light-text);
                  font-size: 16px;
                  padding: 5px;
                "
              >
                <i class="fas fa-eye-slash" id="loginPasswordIcon"></i>
              </span>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%">
            <i class="fas fa-sign-in-alt"></i> 登录
          </button>
        </form>

        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label for="registerName">姓名</label>
            <input
              type="text"
              id="registerName"
              name="name"
              placeholder="请输入姓名"
              required
            />
          </div>
          <div class="form-group">
            <label for="registerPhone">手机号</label>
            <input
              type="tel"
              id="registerPhone"
              name="phone"
              placeholder="请输入手机号"
              required
            />
          </div>
          <div class="form-group">
            <label for="registerPassword">密码</label>
            <input
              type="password"
              id="registerPassword"
              name="password"
              placeholder="请输入密码（至少6位）"
              required
              minlength="6"
            />
          </div>
          <div class="form-group">
            <label for="registerConfirmPassword">确认密码</label>
            <input
              type="password"
              id="registerConfirmPassword"
              name="confirmPassword"
              placeholder="请再次输入密码"
              required
              minlength="6"
            />
          </div>
          <button type="submit" class="btn btn-success" style="width: 100%">
            <i class="fas fa-user-plus"></i> 注册
          </button>
        </form>

        <a href="index.html" class="back-link">
          <i class="fas fa-arrow-left"></i> 返回首页
        </a>
      </div>
    </div>

    <script src="js/main.js"></script>
    <script>
      function togglePasswordVisibility(inputId) {
        const input = document.getElementById(inputId);
        const container = input.parentElement;
        const icon = container.querySelector("i");

        if (input.type === "password") {
          input.type = "text";
          icon.className = "fas fa-eye";
        } else {
          input.type = "password";
          icon.className = "fas fa-eye-slash";
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        const loginTab = document.querySelector('[data-tab="login"]');
        const registerTab = document.querySelector('[data-tab="register"]');
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");
        const successMessage = document.getElementById("successMessage");
        const successText = document.getElementById("successText");

        loginTab.addEventListener("click", function () {
          loginTab.classList.add("active");
          registerTab.classList.remove("active");
          loginForm.classList.add("active");
          registerForm.classList.remove("active");
          successMessage.style.display = "none";
        });

        registerTab.addEventListener("click", function () {
          registerTab.classList.add("active");
          loginTab.classList.remove("active");
          registerForm.classList.add("active");
          loginForm.classList.remove("active");
          successMessage.style.display = "none";
        });

        function showMessage(message, type = "error") {
          const msgDiv = document.createElement("div");
          msgDiv.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            animation: fadeIn 0.3s ease-out;
          `;

          if (type === "success") {
            msgDiv.style.backgroundColor = "var(--success-color)";
          } else if (type === "warning") {
            msgDiv.style.backgroundColor = "var(--warning-color)";
          } else {
            msgDiv.style.backgroundColor = "var(--error-color)";
          }

          msgDiv.textContent = message;
          document.body.appendChild(msgDiv);

          setTimeout(() => {
            msgDiv.style.animation = "fadeOut 0.3s ease-in";
            setTimeout(() => {
              document.body.removeChild(msgDiv);
            }, 300);
          }, 3000);
        }

        loginForm.addEventListener("submit", function (e) {
          e.preventDefault();
          const formData = new FormData(this);
          const data = Object.fromEntries(formData);

          const result = AuthManager.login(data.phone, data.password);
          if (result.success) {
            showSuccess("登录成功！正在跳转...");
            setTimeout(() => {
              window.location.href = "user-center.html";
            }, 1000);
          } else {
            showMessage(result.message, "error");
          }
        });

        registerForm.addEventListener("submit", function (e) {
          e.preventDefault();
          const formData = new FormData(this);
          const data = Object.fromEntries(formData);

          if (data.password !== data.confirmPassword) {
            showMessage("两次输入的密码不一致！", "error");
            return;
          }

          const result = AuthManager.register(
            data.name,
            data.phone,
            data.password,
          );
          if (result.success) {
            showSuccess("注册成功！请登录。");
            setTimeout(() => {
              loginTab.click();
            }, 1500);
          } else {
            showMessage(result.message, "error");
          }
        });

        function showSuccess(message) {
          successText.textContent = message;
          successMessage.style.display = "block";
        }
      });
    </script>
  </body>
</html>
